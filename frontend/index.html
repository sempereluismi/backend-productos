<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Productos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>Gestión de Productos</h1>
    </div>
  </header>

  <main>

    <!-- Toolbar: búsqueda + botón nuevo -->
    <section class="toolbar">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Buscar por nombre…"
      />
      <button class="btn btn-primary" id="newProductBtn">+ Nuevo producto</button>
    </section>

    <!-- Tabla de productos -->
    <section class="table-wrapper">
      <table id="productsTable">
        <thead>
          <tr>
            <th data-sort="name" class="sortable">Nombre <span class="sort-icon">↕</span></th>
            <th data-sort="description">Descripción</th>
            <th data-sort="price" class="sortable">Precio <span class="sort-icon">↕</span></th>
            <th data-sort="stock" class="sortable">Stock <span class="sort-icon">↕</span></th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="productsBody">
          <tr><td colspan="5" class="loading">Cargando productos…</td></tr>
        </tbody>
      </table>
    </section>

    <!-- Paginación -->
    <section class="pagination" id="pagination"></section>

  </main>

  <!-- Modal: crear / editar -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nuevo producto</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>

      <form id="productForm" novalidate>
        <input type="hidden" id="productId" />

        <div class="form-group">
          <label for="fieldName">Nombre <span class="required">*</span></label>
          <input type="text" id="fieldName" placeholder="Ej. Camiseta básica" required />
          <span class="field-error" id="errorName"></span>
        </div>

        <div class="form-group">
          <label for="fieldDescription">Descripción</label>
          <textarea id="fieldDescription" rows="3" placeholder="Descripción opcional…"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="fieldPrice">Precio (€) <span class="required">*</span></label>
            <input type="number" id="fieldPrice" min="0" step="0.01" placeholder="0.00" required />
            <span class="field-error" id="errorPrice"></span>
          </div>

          <div class="form-group">
            <label for="fieldStock">Stock <span class="required">*</span></label>
            <input type="number" id="fieldStock" min="0" step="1" placeholder="0" required />
            <span class="field-error" id="errorStock"></span>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast de notificaciones -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
